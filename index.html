<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>LotusLedger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="/public/Css/index.css">
    <script src="/public/JavaScript/index.js" defer></script>
</head>
<body>
    <div class="Content">
    
            <h2>LotusLedger</h2>
            <h1>MTG Collection Organizer &amp; Deck Builder</h1>

            <textarea
                id="txtSearchLibrary"
                placeholder="Search Library..."
                aria-label="Search Library"
            ></textarea>

            <div class="Buttons">
                <button id="btnAdvancedSearch" type="button">Advanced Search</button>
                <button id="btnViewLibrary" type="button">View Library</button>
                <button id="btnViewStorage" type="button">View Storage</button>
                <button id="btnViewDeck" type="button">View Deck</button>
            </div>
        
    </div>
</body>
</html>
