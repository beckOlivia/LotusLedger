<header class="page-header">
    <div class="page-header__brand">
        <div class="page-header__title-wrap">
            <h1 class="page-header__title">LotusLedger</h1>
        </div>
    </div>

    <div class="page-header__search">
        <input type="text" id="txtSearchLibrary" placeholder="Search Library...">
    </div>

    <div class="page-header__actions">
        <button id="btnAdvanceSearch" type="button">Advanced Search</button>
        <button id="btnAddCards" type="button">Add Cards</button>
        <button id="btnExportCards" type="button">Export Cards</button>

        <div class="settings-wrapper">
            <button id="btnSettings" type="button">Settings</button>
            <div id="settingsMenu" class="settings-menu">
                <button id="btnToggleView" type="button">Switch to Image View</button>
                <button id="btnToggleDetailsPanel" type="button">Open Details Panel</button>
            </div>
        </div>
    </div>
</header>
